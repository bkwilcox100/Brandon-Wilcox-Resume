---
layout: default
---

<div class="rise" style="--i:0">
  <h1>{{ page.title }}</h1>
  <p class="soft"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time></p>
</div>

<div class="post-body rise" style="--i:1">
  {{ content }}
</div>

<div class="rise" style="--i:2">
  <a class="back" href="{{ '/blog/' | relative_url }}">Back to writing</a>
</div>
