<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} · Brandon Wilcox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafaf9;
      --text: #292524;
      --soft: #78716c;
      --border: #e7e5e4;
      --accent: #c2410c;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #131110;
        --text: #e7e5e4;
        --soft: #a8a29e;
        --border: #2b2725;
        --accent: #fb923c;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: var(--accent); color: var(--bg); }
    body {
      font-family: "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 96px 24px 120px;
      font-size: 23px;
      line-height: 1.45;
      letter-spacing: -0.012em;
    }
    a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 4px;
      text-decoration-color: color-mix(in srgb, var(--accent) 35%, transparent);
      transition: text-decoration-color .15s ease;
    }
    a:hover { text-decoration-color: var(--accent); }
    a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 2px; }

    h1 { font-size: 30px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 26px; }
    p { margin-bottom: 26px; }
    .soft { color: var(--soft); }
    .back { display: inline-block; margin-top: 40px; font-size: 21px; }

    /* post list */
    .post-list { list-style: none; }
    .post-list li { margin-bottom: 22px; }
    .post-list a { font-weight: 500; }
    .post-list time { display: block; font-size: 16px; color: var(--soft); letter-spacing: 0; margin-top: 2px; }

    /* article body: smaller and looser than the landing copy, since it is read not scanned */
    .post-body { font-size: 19px; line-height: 1.65; letter-spacing: 0; }
    .post-body h2 { font-size: 24px; font-weight: 600; letter-spacing: -0.015em; margin: 44px 0 14px; }
    .post-body h3 { font-size: 20px; font-weight: 600; margin: 32px 0 10px; }
    .post-body p { margin-bottom: 20px; }
    .post-body ul, .post-body ol { margin: 0 0 20px 24px; }
    .post-body li { margin-bottom: 8px; }
    .post-body img { max-width: 100%; height: auto; border-radius: 10px; }
    .post-body blockquote {
      border-left: 2px solid var(--accent);
      padding-left: 18px;
      color: var(--soft);
      margin-bottom: 20px;
    }
    .post-body code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: .86em;
      background: color-mix(in srgb, var(--text) 7%, transparent);
      padding: 2px 5px;
      border-radius: 4px;
    }
    .post-body pre {
      background: color-mix(in srgb, var(--text) 6%, transparent);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      overflow-x: auto;
      margin-bottom: 20px;
    }
    .post-body pre code { background: none; padding: 0; font-size: 15px; }
    .post-body hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }

    @media (prefers-reduced-motion: no-preference) {
      .rise {
        opacity: 0;
        transform: translateY(14px);
        animation: rise .55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: calc(var(--i) * 90ms);
      }
      @keyframes rise { to { opacity: 1; transform: none; } }
    }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
