---
layout: default
title: Writing
---

<div class="rise" style="--i:0">
  <h1>Writing</h1>
  <p class="soft">Notes on what I'm building.</p>
</div>

{% if site.posts.size > 0 %}
  <ul class="post-list">
    {% for post in site.posts %}
      <li class="rise" style="--i:{{ forloop.index }}">
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%B %-d, %Y" }}</time>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <div class="rise" style="--i:1">
    <p>Nothing here yet. The first post is on the way.</p>
  </div>
{% endif %}

<div class="rise" style="--i:{{ site.posts.size | plus: 1 }}">
  <a class="back" href="{{ '/index.html' | relative_url }}">Back home</a>
</div>
