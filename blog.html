<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Writing · Brandon Wilcox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafaf9;
      --text: #292524;
      --soft: #78716c;
      --border: #e7e5e4;
      --accent: #c2410c;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #131110;
        --text: #e7e5e4;
        --soft: #a8a29e;
        --border: #2b2725;
        --accent: #fb923c;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: var(--accent); color: var(--bg); }
    body {
      font-family: "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 96px 24px 120px;
      font-size: 23px;
      line-height: 1.45;
      letter-spacing: -0.012em;
    }
    a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 4px;
      text-decoration-color: color-mix(in srgb, var(--accent) 35%, transparent);
      transition: text-decoration-color .15s ease;
    }
    a:hover { text-decoration-color: var(--accent); }
    a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 2px; }

    h1 { font-size: 30px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 26px; }
    p { margin-bottom: 26px; }
    .soft { color: var(--soft); }
    .back { display: inline-block; margin-top: 40px; font-size: 21px; }

    @media (prefers-reduced-motion: no-preference) {
      .rise {
        opacity: 0;
        transform: translateY(14px);
        animation: rise .55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: calc(var(--i) * 90ms);
      }
      @keyframes rise { to { opacity: 1; transform: none; } }
    }
  </style>
</head>
<body>
  <main>

    <div class="rise" style="--i:0">
      <h1>Writing</h1>
      <p class="soft">Notes on what I'm building.</p>
    </div>

    <!-- posts will be listed here -->
    <div class="rise" style="--i:1">
      <p>Nothing here yet. The first post is on the way.</p>
    </div>

    <div class="rise" style="--i:2">
      <a class="back" href="index.html">Back home</a>
    </div>

  </main>
</body>
</html>
